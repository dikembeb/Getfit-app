body:`High Intensity Interval Training became the darling of the fitness world in the 2010s. Short workouts, massive calorie burn, afterburn effect — it sounded too good to be true. For fat loss specifically, it largely was.\n\nHIIT burns more total calories during the session but primarily from carbohydrates. LISS burns fewer calories but a much higher percentage from fat. When fat loss is the goal, LISS wins. HIIT also stresses the body significantly — high cortisol response, more recovery time needed, harder to sustain daily.\n\nThe smart approach is to use both strategically. LISS daily as your base fat burning tool — walking 8,000-10,000 steps. HIIT 1-2 times per week as a metabolic booster. Never replace all cardio with HIIT. Your hormones, joints and recovery capacity will thank you.`,
question:“What is the main reason LISS is superior to HIIT specifically for fat loss?”,
options:[“LISS burns more total calories”,“LISS burns a higher percentage of calories from fat”,“LISS is easier to do”,“LISS raises heart rate more”],
answer:1,
points:50,
color:G.orange,
},
{
id:11,
category:“MINDSET”,
tag:“Identity”,
title:“You Don’t Rise to Your Goals — You Fall to Your Systems”,
body:`Goal setting feels productive. I want to lose 30 pounds. I want to squat 315. I want six pack abs. But research on behavior change consistently shows that goals alone almost never create lasting change. Systems do.\n\nA goal is a destination. A system is what you do every day regardless of how you feel. Someone who says "I am a person who trains" will outperform someone who says "I want to get fit" every single time — because identity-based habits are self-reinforcing. Every workout becomes evidence that confirms who you are.\n\nStart small and make it inevitable. Don't commit to an hour workout. Commit to putting on your gym shoes. The action follows the identity. Once you see yourself as someone who moves their body daily, skipping becomes the exception, not the default.`,
question:“According to behavior change research, what is more effective than goal setting for long-term fitness success?”,
options:[“Setting bigger goals”,“Having a workout partner”,“Building identity-based systems and habits”,“Tracking calories obsessively”],
answer:2,
points:50,
color:G.lime,
},
{
id:12,
category:“TRAINING SCIENCE”,
tag:“Mind-Muscle Connection”,
title:“The Science of the Mind-Muscle Connection”,
body:`Advanced lifters talk about feeling the muscle work. Beginners think it's gym mythology. It's not — there's real neuroscience behind it and it directly impacts muscle growth.\n\nStudies using EMG (electromyography) show that consciously focusing on the target muscle during an exercise increases its activation by 20-60% compared to just moving the weight. This is especially significant for isolation exercises like curls, lateral raises and flyes where it's easy to let stronger muscles compensate.\n\nPractically this means slowing down, using lighter weight than your ego wants, and spending the first two seconds of every rep establishing contact with the muscle before moving. A 30lb dumbbell curl with a strong mind-muscle connection will build more bicep than a 50lb sloppy curl every single time.`,

title:“Does When You Eat Actually Matter”,
body:`Intermittent fasting, eating every 2 hours, no carbs after 6pm — meal timing advice is everywhere and most of it is overblown. Here's what the research actually shows.\n\nFor overall body composition — fat loss and muscle gain — total daily calorie and protein intake matters far more than when you eat them. However, timing does have a real but smaller impact on performance specifically. Eating protein within 2 hours after training takes advantage of elevated muscle protein synthesis. Eating carbs before training improves workout performance and intensity.\n\nThe one timing strategy with strong evidence is protein distribution — spreading protein across 3-4 meals of 30-40g rather than getting it all in one or two meals. This keeps muscle protein synthesis elevated throughout the day rather than in one spike.`,
question:“What meal timing strategy has the strongest scientific evidence for maximizing muscle growth?”,

function LiveCameraChallenge({exercise, session, multiplier, onComplete, onClose}){
const [phase, setPhase]   = useState(“intro”);   // intro | active | complete | error
const [repCount, setRepCount] = useState(0);

const [stream, setStream] = useState(null);
const videoRef  = useRef(null);
const canvasRef = useRef(null);
const intervalRef = useRef(null);
const repCountRef = useRef(0);

const pts = exercise.pts * multiplier;

// Start camera
const startCamera = () => {
navigator.mediaDevices.getUserMedia({video:{facingMode:“user”,width:640,height:480},audio:false})
.then(s=>{
setStream(s);
if(videoRef.current){ videoRef.current.srcObject=s; videoRef.current.play(); }
setPhase(“active”);
setFeedback(“Get into position and start your reps!”);
startAnalysis();
})
.catch(()=>setPhase(“error”));
};

// Capture a frame from video
const captureFrame = () => {
const video = videoRef.current;
const canvas = canvasRef.current;
if(!video||!canvas) return null;
canvas.width = video.videoWidth||320;
canvas.height = video.videoHeight||240;
canvas.getContext(“2d”).drawImage(video,0,0,canvas.width,canvas.height);
return canvas.toDataURL(“image/jpeg”,0.7).split(”,”)[1];
};

// Claude Vision frame analysis — promise-based (no async/await)
const analyzeFrame = (frameB64) => {
if(!frameB64||analyzing) return;
setAnalyzing(true);
const exId = exercise.id;
const jsonSchema = ‘{“visible”:true,“position”:“up”,“form”:“good”,“feedback”:“cue”}’;

// ── SCIENCE-BASED PROGRESSION ENGINE ─────────────────────────────────────────
function getProgression(rpe, reps, repRange, weight){
const [minReps, maxReps] = repRange.split(”-”).map(Number);
const hitTopOfRange = reps >= maxReps;

if(rpe <= 6){
return {
action:“JUMP WEIGHT”,
suggestion:`Add +10 lbs next session. RPE ${rpe} means you have significant reserve — your body has fully adapted to this load.`,
color:G.lime, safe:true,
};
}
if(rpe <= 8 && !hitTopOfRange){
return {
action:“ADD REPS”,
suggestion:`RPE ${rpe} is your sweet spot. Add 1-2 reps next session before increasing weight. You're building without overreaching.`,
color:G.blue, safe:true,
};
}
if(rpe <= 8 && hitTopOfRange){
return {
action:“INCREASE WEIGHT”,
suggestion:`You hit the top of your rep range at RPE ${rpe}. Add +5 lbs next session and reset reps to the bottom of your range.`,
color:G.lime, safe:true,
};
}
if(rpe === 9){
return {
action:“MICRO LOAD”,
suggestion:`RPE 9 — you're close to your limit. Add just +2.5 lbs next session. Small jumps preserve form and prevent injury.`,
color:G.orange, safe:true,
};
}
return {
action:“HOLD WEIGHT”,
suggestion:`RPE 10 means true max effort. Stay at ${weight} lbs next session and focus on hitting more reps before adding load. Safety first.`,
color:G.red, safe:false,
};
}

},[tActive,timer]);

const updateSet=(key,field,val)=>setSetData(p=>({…p,[key]:{…p[key],[field]:val}}));

setDiMode(“timer”);

updateSet(key,“done”,!sd.done);
setLogOpen(null);

// PAGE: ACTIVITY — Real pedometer with DeviceMotion API
// ─────────────────────────────────────────────────────────────────────────────
function ActivityPage({user}){
const [steps,setSteps]=useState(0);
const [distance,setDistance]=useState(0);   // meters
const [calories,setCalories]=useState(0);
const [floors,setFloors]=useState(0);
const [tracking,setTracking]=useState(false);
const [permission,setPermission]=useState(“unknown”); // unknown|granted|denied
const [wakeLock,setWakeLock]=useState(null);
const [period,setPeriod]=useState(“today”);
const [showAlpha,setShowAlpha]=useState(true);

// Refs for step detection algorithm
const lastAccelRef=useRef({x:0,y:0,z:0});
const lastPeakRef=useRef(0);
const lastFloorAltRef=useRef(null);
const stepCountRef=useRef(0);
const floorCountRef=useRef(0);

// User stats from onboarding for accurate calorie calc
const weightKg=user?.weightKg||75;
const strideLengthM=user?.strideLengthM||0.762; // default ~5’9” person
const bmr=user?.bmr||1700;
const gender=user?.gender||“male”;
const ageNum=user?.age||28;

// MET-based calorie calc per step
// Walking MET ≈ 3.5, running ≈ 7.0
// Cal/min = MET × weight(kg) × 3.5 / 200
// We estimate time from step cadence
const calcCalFromSteps=(stepCount,strideM,weightKg)=>{
const distKm=(stepCount*strideM)/1000;
const met=3.5; // walking MET
// Time estimate: average walking speed 5km/h
const timeHr=distKm/5;
return Math.round(met*weightKg*timeHr);
};

// Step detection using accelerometer peaks
const handleMotion=(e)=>{
const acc=e.accelerationIncludingGravity||e.acceleration;
if(!acc) return;
const x=acc.x||0, y=acc.y||0, z=acc.z||0;
const mag=Math.sqrt(x*x+y*y+z*z);
const last=lastAccelRef.current;
const lastMag=Math.sqrt(last.x*last.x+last.y*last.y+last.z*last.z);
const diff=Math.abs(mag-lastMag);
const now=Date.now();
// Step threshold: magnitude change > 2.5, min 300ms between steps
if(diff>2.5&&(now-lastPeakRef.current)>300){
lastPeakRef.current=now;
stepCountRef.current+=1;
const newSteps=stepCountRef.current;
const newDist=newSteps*strideLengthM;
const newCal=calcCalFromSteps(newSteps,strideLengthM,weightKg);
setSteps(newSteps);
setDistance(newDist);
setCalories(newCal);
}
lastAccelRef.current={x,y,z};
};

// Floor detection via orientation change (rough estimate)
const handleOrientation=(e)=>{
if(e.beta===null) return;
const alt=e.beta;
if(lastFloorAltRef.current===null){ lastFloorAltRef.current=alt; return; }
const diff=alt-lastFloorAltRef.current;
if(Math.abs(diff)>15){
if(diff>0) floorCountRef.current+=1;
lastFloorAltRef.current=alt;
setFloors(floorCountRef.current);
}
};

const requestPermission=()=>{
// iOS 13+ requires explicit permission for DeviceMotion
if(typeof DeviceMotionEvent!==“undefined”&&typeof DeviceMotionEvent.requestPermission===“function”){
DeviceMotionEvent.requestPermission()
.then(state=>{
if(state===“granted”){
setPermission(“granted”);
startTracking();
} else {
setPermission(“denied”);
}
})
.catch(()=>setPermission(“denied”));
} else if(typeof DeviceMotionEvent!==“undefined”){
// Android / older iOS — no permission needed
setPermission(“granted”);
startTracking();
} else {
setPermission(“denied”);
}
};

const startTracking=()=>{
stepCountRef.current=steps;
floorCountRef.current=floors;
window.addEventListener(“devicemotion”,handleMotion);
window.addEventListener(“deviceorientation”,handleOrientation);
setTracking(true);
// Request wake lock to keep screen on
if(navigator.wakeLock){
navigator.wakeLock.request(“screen”)
.then(lock=>setWakeLock(lock))
.catch(()=>{});
}
};

const stopTracking=()=>{
window.removeEventListener(“devicemotion”,handleMotion);
window.removeEventListener(“deviceorientation”,handleOrientation);
setTracking(false);
if(wakeLock){ wakeLock.release(); setWakeLock(null); }
};

useEffect(()=>{ return ()=>{ stopTracking(); }; },[]);

const distMiles=(distance/1609.34);
const stepGoal=10000;
const calGoal=500;
const pct=Math.min(Math.round((steps/stepGoal)*100),100);

const stats=[
{label:“STEPS”,    val:steps.toLocaleString(),      sub:`Goal: ${stepGoal.toLocaleString()}`,  color:G.lime,   icon:I.walk,   pct:Math.min((steps/stepGoal)*100,100)},
{label:“DISTANCE”, val:distMiles.toFixed(2)+” mi”,  sub:“Today”,                               color:G.blue,   icon:I.mapPin, pct:Math.min((distMiles/5)*100,100)},
{label:“CALORIES”, val:calories+” kcal”,             sub:“Active burn”,                         color:G.orange, icon:I.flame,  pct:Math.min((calories/calGoal)*100,100)},
{label:“FLOORS”,   val:String(floors),               sub:“Estimated”,                           color:G.gold,   icon:I.trendUp,pct:Math.min((floors/10)*100,100)},
];

const periods=[{id:“today”,label:“TODAY”},{id:“week”,label:“WEEK”},{id:“month”,label:“MONTH”}];

return(

function PhotoUploadModal({weekNumber,existingPhoto,onSave,onClose}){

const handleFile=(e)=>{const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>setImgData(ev.target.result.split(”,”)[1]);reader.readAsDataURL(file);};
const analyzePhoto=()=>{
setLoading(true);

function Onboarding({onComplete}){
const [step,setStep]=useState(0);
const [name,setName]=useState(””);
const [goal,setGoal]=useState(null);
const [split,setSplit]=useState(null);
const [focus,setFocus]=useState(null);
const [sport,setSport]=useState(null);
const [expandedSplit,setExpandedSplit]=useState(null);
const [expandedFocus,setExpandedFocus]=useState(null);
// Body stats for accurate calorie calculation
const [weight,setWeight]=useState(””);
const [height,setHeight]=useState(””);
const [age,setAge]=useState(””);
const [gender,setGender]=useState(null);
const [weightUnit,setWeightUnit]=useState(“lbs”);
const [heightUnit,setHeightUnit]=useState(“ft”);

const goals=[
{id:“loseweight”,label:“Lose Fat”,     icon:I.flame,    color:G.orange},
{id:“buildmuscle”,label:“Build Muscle”,icon:I.dumbbell, color:G.lime},
{id:“athletic”,   label:“Athletic Performance”,icon:I.bolt,color:G.blue},
{id:“health”,     label:“General Health”,icon:I.target,  color:G.gold},
];

const selectedSplit=SPLITS.find(s=>s.id===split);
const selectedFocus=FOCUSES.find(f=>f.id===focus);

// Step mapping: 0=welcome 1=name 2=bodystats 3=goal 4=split 5=focus 6=sport(if athletic)
const canNext=()=>{
if(step===1) return name.trim().length>0;
if(step===2) return !!gender&&weight.trim().length>0&&height.trim().length>0&&age.trim().length>0;
if(step===3) return !!goal;
if(step===4) return !!split;
if(step===5) return !!focus;
if(step===6) return !!sport;
return true;
};

const next=()=>{
if(step===4&&split===“athletic”){ setStep(5); return; }
if(step===5&&split===“athletic”){ setStep(6); return; }
if(step===5&&split!==“athletic”){ finish(); return; }
if(step===6){ finish(); return; }
setStep(s=>s+1);
