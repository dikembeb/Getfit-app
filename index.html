<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#080808"/>
  <title>Get Fit or Die Trying</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{background:#080808;min-height:100vh;-webkit-tap-highlight-color:transparent;}
    #loading{
      position:fixed;inset:0;background:#080808;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:28px;z-index:9999;transition:opacity 0.5s ease;
    }
    .ring-wrap{position:relative;width:180px;height:180px;}
    .ring-center{
      position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    }
    .ring-num{
      font-family:sans-serif;font-weight:900;font-size:48px;
      color:#aaff00;line-height:1;
      text-shadow:0 0 20px rgba(170,255,0,0.6);
    }
    .ring-sub{
      font-family:sans-serif;font-size:10px;font-weight:700;
      color:#444;letter-spacing:3px;
    }
    .brand{
      font-family:sans-serif;font-weight:900;font-size:20px;
      color:#aaff00;letter-spacing:4px;
      text-shadow:0 0 20px rgba(170,255,0,0.4);
    }
    .tagline{
      font-family:sans-serif;font-size:11px;color:#555;
      letter-spacing:3px;transition:opacity 0.3s ease;
      min-height:16px;
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="ring-wrap">
    <svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <!-- Outer track -->
      <circle cx="90" cy="90" r="78" fill="none" stroke="#141414" stroke-width="14"/>
      <!-- Secondary inner ring track -->
      <circle cx="90" cy="90" r="60" fill="none" stroke="#0f0f0f" stroke-width="8"/>
      <!-- Tick marks -->
      <g stroke="#1e1e1e" stroke-width="1.5">
        <line x1="90" y1="4"  x2="90" y2="14"  transform="rotate(0   90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="10"  transform="rotate(30  90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="10"  transform="rotate(60  90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="14"  transform="rotate(90  90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="10"  transform="rotate(120 90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="10"  transform="rotate(150 90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="14"  transform="rotate(180 90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="10"  transform="rotate(210 90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="10"  transform="rotate(240 90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="14"  transform="rotate(270 90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="10"  transform="rotate(300 90 90)"/>
        <line x1="90" y1="4"  x2="90" y2="10"  transform="rotate(330 90 90)"/>
      </g>
      <!-- Main progress ring -->
      <circle id="ring" cx="90" cy="90" r="78"
        fill="none" stroke="#aaff00" stroke-width="14"
        stroke-dasharray="0 490"
        stroke-dashoffset="122.5"
        stroke-linecap="round"
        filter="url(#glow)"
        transform="rotate(-90 90 90)"/>
      <!-- Inner accent ring -->
      <circle id="ring2" cx="90" cy="90" r="60"
        fill="none" stroke="#7acc00" stroke-width="4"
        stroke-dasharray="0 377"
        stroke-dashoffset="94"
        stroke-linecap="round"
        opacity="0.5"
        transform="rotate(-90 90 90)"/>
      <!-- Dot at tip of ring -->
      <circle id="tip" cx="90" cy="12" r="7" fill="#aaff00" filter="url(#glow)"
        transform="rotate(-90 90 90)"/>
    </svg>
    <div class="ring-center">
      <div class="ring-num" id="num">0</div>
      <div class="ring-sub">LOADING</div>
    </div>
  </div>

  <div class="brand">GET FIT OR DIE TRYING</div>
  <div class="tagline" id="msg">INITIALIZING...</div>
</div>

<div id="root"></div>

<script>
(function(){
  var ring    = document.getElementById('ring');
  var ring2   = document.getElementById('ring2');
  var tip     = document.getElementById('tip');
  var numEl   = document.getElementById('num');
  var msgEl   = document.getElementById('msg');
  var loading = document.getElementById('loading');

  var CIRC1 = 2 * Math.PI * 78;   // 490
  var CIRC2 = 2 * Math.PI * 60;   // 377
  var DURATION = 3200;
  var start = null;
  var lastMsg = '';
  var msgs = [
    [0,   "INITIALIZING..."],
    [20,  "LOADING WORKOUTS..."],
    [45,  "BUILDING YOUR PLAN..."],
    [70,  "ALMOST READY..."],
    [90,  "LET'S GET TO WORK."],
  ];

  function easeInOut(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function tick(ts){
    if(!start) start = ts;
    var elapsed = Math.min(ts - start, DURATION);
    var raw = elapsed / DURATION;
    var e   = easeInOut(raw);
    var pct = Math.round(e * 100);

    // Main ring
    var dash1 = e * CIRC1;
    ring.setAttribute('stroke-dasharray', dash1.toFixed(1) + ' ' + (CIRC1 - dash1).toFixed(1));

    // Inner accent ring — slightly behind
    var e2 = easeInOut(Math.max(0, raw - 0.05));
    var dash2 = e2 * CIRC2;
    ring2.setAttribute('stroke-dasharray', dash2.toFixed(1) + ' ' + (CIRC2 - dash2).toFixed(1));

    // Tip dot — rides along the ring
    var angle = e * 360 - 90;
    var rad   = angle * Math.PI / 180;
    var tx    = 90 + 78 * Math.cos(rad);
    var ty    = 90 + 78 * Math.sin(rad);
    tip.setAttribute('cx', tx.toFixed(1));
    tip.setAttribute('cy', ty.toFixed(1));

    // Number
    numEl.textContent = pct;

    // Color shifts: lime → gold at 70% → lime at 100%
    var color = pct >= 90 ? '#aaff00' : pct >= 70 ? '#ffd000' : '#aaff00';
    ring.setAttribute('stroke', color);
    tip.setAttribute('fill', color);
    numEl.style.color = color;
    numEl.style.textShadow = '0 0 20px ' + color + '99';

    // Messages
    var newMsg = msgs[0][1];
    for(var i=0; i<msgs.length; i++){
      if(pct >= msgs[i][0]) newMsg = msgs[i][1];
    }
    if(newMsg !== lastMsg){
      lastMsg = newMsg;
      msgEl.style.opacity = '0';
      var m = newMsg;
      setTimeout(function(){ msgEl.textContent = m; msgEl.style.opacity = '1'; }, 250);
    }

    if(raw < 1){
      requestAnimationFrame(tick);
    } else {
      numEl.textContent = '100';
      ring.setAttribute('stroke-dasharray', CIRC1 + ' 0');
      setTimeout(function(){
        loading.style.opacity = '0';
        setTimeout(function(){ loading.style.display = 'none'; }, 500);
      }, 400);
    }
  }

  requestAnimationFrame(tick);
})();
</script>

    body:`You can have the perfect program, perfect diet, perfect sleep — and still make zero progress. If you're not applying progressive overload, you're just maintaining.\n\nProgressive overload means consistently giving your muscles a reason to grow by increasing the demand placed on them over time. This doesn't always mean adding weight. It can mean more reps at the same weight, shorter rest periods, better range of motion, or slower tempo.\n\nYour body adapts to stress. Once it adapts, growth stops. The solution is simple — every session, try to do a little more than last time. Even one extra rep on your last set is progress. Track your lifts. If the numbers aren't moving, neither are your muscles.`,

      : "You are analyzing a live pull-up challenge. User needs "+exercise.goal+" pullups. Rep count: "+repCountRef.current+". Last position: "+(lastPosition||"unknown")+". Determine: 1) Is person visible doing pullup? 2) Position: up (chin above bar), down (arms extended), or mid? 3) Form acceptable? Return ONLY JSON: "+jsonSchema;

    fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:150,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:frameB64}},
          {type:"text",text:prompt}
        ]}]
      })
    })
    .then(r=>r.json())
    .then(data=>{
      const text=_optionalChain([data, 'access', _2 => _2.content, 'optionalAccess', _3 => _3[0], 'optionalAccess', _4 => _4.text])||"{}";
      const result=JSON.parse(text.replace(/```json|```/g,"").trim());
      if(result.feedback) setFeedback(result.feedback);
      if(result.visible && result.form!=="bad"){
        const pos=result.position;
        if(pos==="down"&&lastPosition!=="down") setLastPosition("down");
        if(pos==="up"&&lastPosition==="down"){
          const newCount=repCountRef.current+1;
          repCountRef.current=newCount;
          setRepCount(newCount);
          setLastPosition("up");
          setFeedback("Rep "+newCount+" — "+(newCount>=exercise.goal?"DONE! CRUSHING IT!":(exercise.goal-newCount)+" to go. Keep going!"));
          if(newCount>=exercise.goal){ stopCamera(); setPhase("complete"); }
        } else if(pos!=="down"){ setLastPosition(pos); }
      }
      setAnalyzing(false);
    })
    .catch(()=>setAnalyzing(false));
  };

  const startAnalysis = () => {
    // Analyze every 2.5 seconds — balances accuracy vs API cost
    intervalRef.current = setInterval(()=>{
      const frame = captureFrame();
      if(frame) analyzeFrame(frame);
    }, 2500);
  };

  const stopCamera = () => {

    if(stream) stream.getTracks().forEach(t=>t.stop());

// ── SCIENCE-BASED PROGRESSION ENGINE ─────────────────────────────────────────
function getProgression(rpe, reps, repRange, weight){
  const [minReps, maxReps] = repRange.split("-").map(Number);
  const hitTopOfRange = reps >= maxReps;

  if(rpe <= 6){
    return {
      action:"JUMP WEIGHT",
      suggestion:`Add +10 lbs next session. RPE ${rpe} means you have significant reserve — your body has fully adapted to this load.`,
      color:G.lime, safe:true,
    };
  }
  if(rpe <= 8 && !hitTopOfRange){
    return {
      action:"ADD REPS",
      suggestion:`RPE ${rpe} is your sweet spot. Add 1-2 reps next session before increasing weight. You're building without overreaching.`,
      color:G.blue, safe:true,
    };
  }
  if(rpe <= 8 && hitTopOfRange){
    return {
      action:"INCREASE WEIGHT",
      suggestion:`You hit the top of your rep range at RPE ${rpe}. Add +5 lbs next session and reset reps to the bottom of your range.`,
      color:G.lime, safe:true,
    };
  }
  if(rpe === 9){
    return {
      action:"MICRO LOAD",
      suggestion:`RPE 9 — you're close to your limit. Add just +2.5 lbs next session. Small jumps preserve form and prevent injury.`,
      color:G.orange, safe:true,
    };
  }
  return {
    action:"HOLD WEIGHT",
    suggestion:`RPE 10 means true max effort. Stay at ${weight} lbs next session and focus on hitting more reps before adding load. Safety first.`,
    color:G.red, safe:false,
  };
}
